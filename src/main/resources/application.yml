spring:
  application:
    name: Vahak-ApiGatewayService
  cloud:
    gateway:
      routes:
        - id: vahak-auth
          uri: lb://Vahak-AuthService
          predicates:
            - Path=/api/v1/auth/**

server:
  port: 7002

eureka:
  client:
    service-url:
      defaultZone: http://localhost:7001/eureka/
  instance:
    prefer-ip-address: true


jwt:
  expiry: 600
